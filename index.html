<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Business India - Calculation Logic</title>
  <link rel="stylesheet" href="style.css" />
  <script src="game.js"></script>
</head>
<body>
  <div class="container">
    <!-- Banking Input Section -->
    <div class="banking-section">
      <h2>Bank Actions</h2>
      <div>
        <label>+ Amount:</label>
        <input type="number" id="bank-add-amount" placeholder="Enter + amount">
        <button onclick="updateBank('+', document.getElementById('bank-add-amount').value)">Update Bank</button>
      </div>
      <div>
        <label>- Amount:</label>
        <input type="number" id="bank-subtract-amount" placeholder="Enter - amount">
        <button onclick="updateBank('-', document.getElementById('bank-subtract-amount').value)">Update Bank</button>
      </div>
      <div>Current Bank Balance: <span id="bank-display">₹0</span></div>
    </div>

    <!-- Player Accounts Section -->
    <div class="players-section">
      <h2>Player Accounts</h2>
      <div class="player-section" id="player1-section">
        <p>Player 1 Cash: <span id="player1-cash">₹0</span></p>
      </div>
      <div class="player-section" id="player2-section">
        <p>Player 2 Cash: <span id="player2-cash">₹0</span></span></p>
      </div>
    </div>

    <!-- City Search Box -->
    <h2>City Search</h2>
    <input type="text" id="city-search" placeholder="Search cities...">

    <!-- City List -->
    <div class="city-list" id="city-list">
      <!-- Dynamic city cards will be injected here -->
    </div>
  </div>
</body>
</html>
